<!DOCTYPE html>
<html>
<head>
    <title>Cat Adoption Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- HAMBURGER BUTTON -->
<button id="menu-toggle" class="hamburger">☰</button>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <h2>Cat Adoption</h2>
    <p class="panel-text">User Panel</p>

    <a href="{{ url_for('dashboard') }}" class="active">
        Available Cats
    </a>

    <a href="{{ url_for('history') }}" 
   style="padding:8px 15px; background:#e07a5f; color:white; border-radius:10px; text-decoration:none; padding: 12px;">
   View Adoption History
</a>

    <a href="{{ url_for('profile') }}">My Profile</a>

    <div class="logout">
        <a href="{{ url_for('logout') }}" class="logout-btn">
            Logout
        </a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content" class="main-content">

    <div class="container">

        <!-- SEARCH FORM -->
        <form method="GET" action="{{ url_for('dashboard') }}">
            <div class="top-bar">
                <div></div>

                <div class="search-section">
                    <input type="text" 
                           name="search"
                           placeholder="Search by name..."
                           value="{{ request.args.get('search', '') }}">

                    <select name="breed">
                        <option value="All Breeds"
                            {% if request.args.get('breed') == 'All Breeds' %}selected{% endif %}>
                            All Breeds
                        </option>
                        <option value="Persian"
                            {% if request.args.get('breed') == 'Persian' %}selected{% endif %}>
                            Persian
                        </option>
                        <option value="Siamese"
                            {% if request.args.get('breed') == 'Siamese' %}selected{% endif %}>
                            Siamese
                        </option>
                        <option value="Ragdoll"
                            {% if request.args.get('breed') == 'Ragdoll' %}selected{% endif %}>
                            Ragdoll
                        </option>
                        <option value="British Shorthair"
                            {% if request.args.get('breed') == 'British Shorthair' %}selected{% endif %}>
                            British Shorthair
                        </option>
                    </select>

                </div>
            </div>
        </form>

        <!-- TITLE -->
        <h2>Available Cats</h2>
        <p class="sub-text">
            Browse our lovely cats waiting for a new home
        </p>

        <!-- CATS GRID -->
        <div class="cats-grid">
            {% for cat in cats %}
            <div class="cat-card">

                <img src="{{ url_for('static', filename='images/' + cat[5]) }}" 
                     alt="{{ cat[1] }}" 
                     class="cat-image">

                <div class="cat-info">
                    <h3>{{ cat[1] }}</h3>
                    <p><strong>Age:</strong> {{ cat[2] }}</p>
                    <p><strong>Breed:</strong> {{ cat[3] }}</p>
                    <p><strong>Gender:</strong> {{ cat[4] }}</p>

                    <button class="adopt-btn"
                        onclick="openModal('{{ cat[0] }}','{{ cat[1] }}','{{ cat[3] }}','{{ cat[2] }}','{{ cat[4] }}')">
                        ❤ Adopt me
                    </button>
                </div>

            </div>
            {% endfor %}
        </div>

    </div>

</div>

<!-- ================= MODAL ================= -->
<div id="adoptModal" class="modal">
    <div class="modal-content">

        <span class="close-btn" onclick="closeModal()">×</span>
        <h2>Adoption Request</h2>

        <div class="selected-cat-box">
            <p><strong>Selected Cat:</strong></p>
            <h3 id="modalCatName"></h3>
            <p id="modalCatDetails"></p>
        </div>

        <form method="POST" action="{{ url_for('adopt_request') }}">
            <input type="hidden" name="cat_id" id="modalCatId">

            <label>Your Name</label>
            <input type="text" name="fullname" placeholder="Enter your full name" required>

            <label>Contact Number</label>
            <input type="text" name="contact" placeholder="Enter your phone number" required>

            <label>Address</label>
            <input type="text" name="address" placeholder="Enter your complete address" required>

            <div class="modal-buttons">
                <button type="button" onclick="closeModal()" class="cancel-btn">
                    Cancel
                </button>
                <button type="submit" class="submit-btn">
                    Submit Request
                </button>
            </div>
        </form>

    </div>
</div>

<!-- SIDEBAR TOGGLE SCRIPT -->
<script>
document.getElementById("menu-toggle").addEventListener("click", function() {
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("main-content").classList.toggle("shift");
});

function openModal(id, name, breed, age, gender) {
    document.getElementById("adoptModal").style.display = "flex";

    document.getElementById("modalCatId").value = id;
    document.getElementById("modalCatName").innerText = name;
    document.getElementById("modalCatDetails").innerText =
        breed + " - " + age + " yrs - " + gender;
}

function closeModal() {
    document.getElementById("adoptModal").style.display = "none";
}
</script>

</body>
</html>
