<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Cat Adoption</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ css_version }}">
</head>
<body>
<div class="auth-page">

    <!-- LEFT: Visual branding panel -->
    <div class="auth-left">
        <div class="auth-left-bg" id="authBg"></div>
        <div class="auth-left-overlay"></div>

        <!-- Floating logo decorations -->
        <img class="paw paw-1" src="{{ url_for('static', filename='images/logo.png') }}" alt="">
        <img class="paw paw-2" src="{{ url_for('static', filename='images/logo.png') }}" alt="">
        <img class="paw paw-3" src="{{ url_for('static', filename='images/logo.png') }}" alt="">

        <div class="auth-left-content">
            <img class="auth-brand-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Cat Adoption logo">
            <h1 class="auth-brand-title">Cat Adoption</h1>
            <p class="auth-brand-sub">Find your perfect furry companion and give them a loving forever home.</p>
        </div>
    </div>

    <!-- RIGHT: Form panel -->
    <div class="auth-right">
        <div class="auth-card">
            <h2 class="auth-heading">Welcome back</h2>
            <p class="auth-subheading">Sign in to your account to continue</p>

            {% if error %}
            <div class="alert alert-error">⚠ {{ error }}</div>
            {% endif %}

            <form method="POST" id="loginForm" novalidate>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-icon-wrap">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon-wrap">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" name="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)" tabindex="-1" aria-label="Show password">
                            <svg id="loginEyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-auth" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-spinner" style="display:none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    </span>
                </button>
            </form>

            <p class="auth-switch">
                Don't have an account?
                <a href="{{ url_for('register') }}">Create one</a>
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('authBg').style.backgroundImage =
    "url('{{ url_for('static', filename='images/cat2.jpg') }}')";
function togglePw(id, btn) {
    const input = document.getElementById(id);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    // Swap between eye and eye-off SVG paths
    btn.querySelector('svg').innerHTML = show
        ? '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>'
        : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
}

document.getElementById('loginForm').addEventListener('submit', function() {
    const btn  = document.getElementById('loginBtn');
    btn.querySelector('.btn-text').style.display   = 'none';
    btn.querySelector('.btn-spinner').style.display = 'inline';
    btn.disabled = true;
});
</script>
</body>
</html>
