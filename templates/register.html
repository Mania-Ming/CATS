<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Cat Adoption</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-left">
        <div class="brand-logo">🐾</div>
        <h1>Join Us Today</h1>
        <p>Create an account to adopt a cat and give them the loving home they deserve.</p>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <h2>Create account</h2>
            <p class="subtitle">Fill in your details to get started</p>

            {% if error %}
            <div class="alert alert-error">⚠ {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullname" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Create Account</button>
            </form>

            <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-muted);">
                Already have an account?
                <a href="{{ url_for('login') }}" style="color:var(--primary); font-weight:600;">Sign in</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
