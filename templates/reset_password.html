<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Cat Adoption</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ css_version }}">
    <style>
        .req-item { color: #ef4444; margin: 2px 0; }
        .req-item.met { color: #22c55e; }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-left">
        <div class="auth-left-bg" id="authBg"></div>
        <div class="auth-left-overlay"></div>
        <img class="paw paw-1" src="{{ url_for('static', filename='images/logo.png') }}" alt="">
        <img class="paw paw-2" src="{{ url_for('static', filename='images/logo.png') }}" alt="">
        <img class="paw paw-3" src="{{ url_for('static', filename='images/logo.png') }}" alt="">
        <div class="auth-left-content">
            <img class="auth-brand-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Cat Adoption logo">
            <h1 class="auth-brand-title">New Password</h1>
            <p class="auth-brand-sub">Choose a strong password for your account.</p>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <h2 class="auth-heading">Set new password</h2>
            <p class="auth-subheading">Enter your new password below.</p>

            <div id="error-msg" class="alert alert-error" style="display:none;"></div>
            <div id="success-msg" class="alert alert-success" style="display:none;"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-icon-wrap">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                        <button type="button" class="pw-toggle" onclick="togglePw('newPassword', this)" tabindex="-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div id="pw-requirements" style="display:none;margin-top:8px;padding:10px 12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;font-size:13px;">
                        <div id="req-length" class="req-item">✗ At least 6 characters</div>
                        <div id="req-letter" class="req-item">✗ Contains a letter</div>
                        <div id="req-number" class="req-item">✗ Contains a number</div>
                    </div>
                </div>
                <button type="submit" class="btn btn-auth" id="submitBtn">Update Password</button>
            </form>

            <p class="auth-switch" style="margin-top:1rem;">
                <a href="{{ url_for('login') }}">← Back to Sign In</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.getElementById('authBg').style.backgroundImage =
    "url('{{ url_for('static', filename='images/cat4.jpg') }}')";

const _supabase = supabase.createClient(
    "{{ SUPABASE_URL }}",
    "{{ SUPABASE_KEY }}"
);

// Supabase puts tokens in the URL fragment: #access_token=...&refresh_token=...&type=recovery
const hash   = window.location.hash.substring(1);
const params = Object.fromEntries(new URLSearchParams(hash));

const errorMsg   = document.getElementById('error-msg');
const successMsg = document.getElementById('success-msg');

function showError(msg) {
    errorMsg.textContent = '⚠ ' + msg;
    errorMsg.style.display = 'block';
    successMsg.style.display = 'none';
}

// Set the session from the URL tokens so updateUser works
if (params.access_token && params.type === 'recovery') {
    _supabase.auth.setSession({
        access_token:  params.access_token,
        refresh_token: params.refresh_token || '',
    }).then(({ error }) => {
        if (error) showError('Session expired. Please request a new reset link.');
    });
} else if (!params.access_token) {
    showError('Invalid or expired reset link. Please request a new one.');
    document.getElementById('resetForm').style.display = 'none';
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('newPassword').value.trim();
    if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await _supabase.auth.updateUser({ password });
    if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Update Password';
    } else {
        successMsg.textContent = '✓ Password updated! Redirecting to login...';
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
        setTimeout(() => window.location.href = '/login', 2000);
    }
});

// Password requirements live feedback
const pwInput = document.getElementById('newPassword');
const pwBox   = document.getElementById('pw-requirements');
const reqLen  = document.getElementById('req-length');
const reqLet  = document.getElementById('req-letter');
const reqNum  = document.getElementById('req-number');

pwInput.addEventListener('focus', () => pwBox.style.display = 'block');
pwInput.addEventListener('blur',  () => { if (!pwInput.value) pwBox.style.display = 'none'; });
pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    const lenOk = v.length >= 6, letOk = /[a-zA-Z]/.test(v), numOk = /[0-9]/.test(v);
    reqLen.textContent = (lenOk ? '✓' : '✗') + ' At least 6 characters';
    reqLet.textContent = (letOk ? '✓' : '✗') + ' Contains a letter';
    reqNum.textContent = (numOk ? '✓' : '✗') + ' Contains a number';
    reqLen.className = 'req-item' + (lenOk ? ' met' : '');
    reqLet.className = 'req-item' + (letOk ? ' met' : '');
    reqNum.className = 'req-item' + (numOk ? ' met' : '');
});

function togglePw(id, btn) {
    const input = document.getElementById(id);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = show
        ? '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>'
        : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
}
</script>
</body>
</html>
